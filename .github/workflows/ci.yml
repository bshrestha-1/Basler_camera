name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Qt system libraries
        run: |
        sudo apt-get update
        sudo apt-get install -y \
        libegl1 \
        libgl1 \
        libopengl0 \
        libxcb-cursor0 \
        libxkbcommon-x11-0

      - name: Configure Qt
        run: echo "QT_QPA_PLATFORM=offscreen" >> $GITHUB_ENV

      - name: Install GLAS with development dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Check formatting (ruff format)
        run: ruff format --check src tests

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest --cov=glas --cov-report=term-missing
        env:
          # Camera- and dataset-touching tests run against pypylon's
          # built-in emulated-camera transport layer rather than
          # physical hardware; conftest.py sets this too, but pinning it
          # explicitly here makes the CI environment self-documenting.
          PYLON_CAMEMU: "2"
